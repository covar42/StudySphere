<!DOCTYPE html>\n<html lang="en">\n<head>\n    <meta charset="UTF-8">\n    <meta name="viewport" content="width=device-width, initial-scale=1.0">\n    <title>Game Website</title>\n    <style>\n        body { font-family: Arial, sans-serif; text-align: center; }\n        #games { margin: 20px; }\n        button { margin: 10px; padding: 10px; font-size: 16px; }\n        #gameFrame { width: 600px; height: 400px; border: 1px solid #000; margin: 0 auto; display: none; }\n    </style>\n</head>\n<body>\n    <h1>Welcome to the Game Website</h1>\n    <div id="games">\n        <button onclick="loadGame('snake')">Snake</button>\n        <button onclick="loadGame('pong')">Pong</button>\n    </div>\n    <div id="gameFrame"></div>\n    <script>\n        function loadGame(game) {\n            const frame = document.getElementById('gameFrame');\n            frame.style.display = 'block';\n            if (game === 'snake') {\n                frame.innerHTML = '<h2>Snake Game Loaded</h2>'; // Placeholder for Snake game\n            } else if (game === 'pong') {\n                frame.innerHTML = '<h2>Pong Game Loaded</h2>'; // Placeholder for Pong game\n            }\n        }\n    </script>\n</body>\n</html>
